services:

  identity-db:
    image: postgres:16-bookworm
    container_name: identity-db

    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: myagenda
      POSTGRES_PASSWORD: myagenda

    ports:
      - "5432:5432"

    volumes:
      - identity_pg_data:/var/lib/postgresql/data

  core-db:
    image: postgres:16-bookworm
    container_name: core-db

    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: myagenda
      POSTGRES_PASSWORD: myagenda

    ports:
      - "5433:5432"

    volumes:
      - core_pg_data:/var/lib/postgresql/data

  payment-db:
    image: postgres:16-bookworm
    container_name: payment-db

    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: myagenda
      POSTGRES_PASSWORD: myagenda

    ports:
      - "5434:5432"

    volumes:
      - payment_pg_data:/var/lib/postgresql/data

  notification-db:
    image: postgres:16-bookworm
    container_name: notification-db

    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: myagenda
      POSTGRES_PASSWORD: myagenda

    ports:
      - "5435:5432"

    volumes:
      - notification_pg_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  identity_pg_data:
  core_pg_data:
  payment_pg_data:
  notification_pg_data: