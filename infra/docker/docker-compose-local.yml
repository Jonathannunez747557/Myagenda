services:

  identity-db:
    image: postgres:16-bookworm
    container_name: identity-db

    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: myagenda
      POSTGRES_PASSWORD: myagenda

    ports:
      - "5432:5432"

    volumes:
      - identity_pg_data:/var/lib/postgresql/data

volumes:
  identity_pg_data: