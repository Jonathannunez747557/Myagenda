spring:
  profiles:
    active: local
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: login-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/login/**
          filters:
            - StripPrefix=1

        - id: authorization-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/authorization/**
          filters:
            - StripPrefix=1

        - id: users-service-route
          uri: http://localhost:8083
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=1

        - id: identity-validation-service-route
          uri: http://localhost:8084
          predicates:
            - Path=/identity-validation/**
          filters:
            - StripPrefix=1

        - id: onboarding-service-route
          uri: http://localhost:8085
          predicates:
            - Path=/onboarding/**
          filters:
            - StripPrefix=1

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus