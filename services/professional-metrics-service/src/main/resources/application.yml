spring:
  profiles:
    active: local
  application:
    name: professional-metrics-service
  data:
    mongodb:
      uri: mongodb://myagenda:myagenda@localhost:27017/metrics_db?authSource=admin
      auto-index-creation: true
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: clave-super-secreta-12345678901234567890

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always
